<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ทะเบียนความเสี่ยง</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>

html,body{
margin:0;
padding:0;
overflow-x:hidden;
background:#f0fdfa;
font-family:sans-serif;
}

.card{
transition:.25s;
}

.card:hover{
transform:translateY(-4px);
}

.menu-item{
transition:.25s;
}

.menu-item.active{
background:#0f766e;
color:white;
}

</style>

</head>

<body>

<div class="w-full max-w-screen-2xl mx-auto p-3 sm:p-5">

<div class="flex justify-between items-center mb-5">

<h1 class="text-xl sm:text-3xl font-bold text-teal-700">
ทะเบียนความเสี่ยง
</h1>

<button onclick="switchTab('add')"
class="bg-teal-600 text-white px-4 py-2 rounded-xl">

<i class="fas fa-plus"></i>

เพิ่มข้อมูล

</button>

</div>

<!-- FORM -->

<div id="addView" class="hidden bg-white rounded-2xl shadow p-4 sm:p-6 mb-5">

<h2 class="text-xl font-bold mb-5 text-teal-700">
เพิ่มข้อมูล
</h2>

<form id="dataFormElement" class="space-y-4">

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

<div>

<label>วันที่</label>

<input type="date"
id="dateInput"
class="w-full border-2 rounded-xl p-3">

</div>

<div>

<label>แผนก</label>

<select id="departmentInput"
class="w-full border-2 rounded-xl p-3">

<option value="">เลือกแผนก</option>

<option>ไตเทียม 4/2</option>

<option>ไตเทียม 5/1</option>

<option>ไตเทียม 5/2</option>

</select>

</div>

<div>

<label>ระดับความเสี่ยง</label>

<select id="riskLevelInput"
class="w-full border-2 rounded-xl p-3">

<option value="">เลือกระดับ</option>

<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
<option>E</option>
<option>F</option>
<option>G</option>
<option>H</option>
<option>I</option>

</select>

</div>

</div>

<div>

<label>หัวข้อ</label>

<input type="text"
id="subjectInput"
class="w-full border-2 rounded-xl p-3">

</div>

<div>

<label>รายละเอียด</label>

<textarea
id="detailsInput"
rows="4"
class="w-full border-2 rounded-xl p-3"></textarea>

</div>

<div>

<label>แนวทางแก้ไข</label>

<textarea
id="solutionInput"
rows="4"
class="w-full border-2 rounded-xl p-3"></textarea>

</div>

<div>

<label>ผู้รายงาน</label>

<input type="text"
id="reporterInput"
class="w-full border-2 rounded-xl p-3">

</div>

<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

<div>

<label>รูปภาพ 1</label>

<input type="file"
id="file1Input"
accept="image/*"
class="w-full border-2 rounded-xl p-3">

</div>

<div>

<label>รูปภาพ 2</label>

<input type="file"
id="file2Input"
accept="image/*"
class="w-full border-2 rounded-xl p-3">

</div>

</div>

<div class="pt-3">

<button type="submit"
class="bg-teal-600 hover:bg-teal-700 text-white px-6 py-3 rounded-xl">

บันทึกข้อมูล

</button>

</div>

</form>

</div>

<!-- DATA -->

<div id="dataView">

<div class="mb-5">

<input type="text"
id="searchInput"
placeholder="ค้นหา..."
class="w-full border-2 rounded-2xl p-4">

</div>

<div id="dataCardsContainer"
class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">

</div>

</div>

</div>

<script>

const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbwuZXpealGoAtm5c129us9TyqD4Kww5KOJ_BYUvzy1aXGQw_eqRNVekL15A8W9mz8tL/exec';

let allData = [];

let currentEditId = null;

async function fileToBase64(file){

return new Promise((resolve,reject)=>{

const reader = new FileReader();

reader.readAsDataURL(file);

reader.onload=()=>resolve(reader.result);

reader.onerror=error=>reject(error);

});

}

function switchTab(tab){

document
.getElementById('addView')
.classList.add('hidden');

document
.getElementById('dataView')
.classList.add('hidden');

if(tab==='add'){

document
.getElementById('addView')
.classList.remove('hidden');

}else{

document
.getElementById('dataView')
.classList.remove('hidden');

}

}

async function loadData(){

const response =
await fetch(`${SCRIPT_URL}?action=getData`);

const result = await response.json();

allData = result.data || [];

displayCards(allData);

}

function displayCards(data){

const container =
document.getElementById('dataCardsContainer');

if(data.length===0){

container.innerHTML = `
<div class="col-span-full text-center py-10">
ไม่มีข้อมูล
</div>
`;

return;

}

container.innerHTML =
[...data].reverse().map(item=>`

<div class="card bg-white rounded-2xl shadow overflow-hidden">

${item.file1 ?

`<img src="${item.file1}"
class="w-full h-48 object-cover">`

:

`<div class="w-full h-48 bg-teal-100"></div>`

}

<div class="p-4 space-y-2">

<div class="flex justify-between items-center">

<div class="text-xs bg-teal-100 text-teal-700 px-3 py-1 rounded-full">
${item.department || '-'}
</div>

<div class="text-xs bg-red-100 text-red-700 px-3 py-1 rounded-full">
${item.riskLevel}
</div>

</div>

<h3 class="font-bold text-lg">
${item.subject || '-'}
</h3>

<p class="text-sm text-gray-600 line-clamp-3">
${item.details || '-'}
</p>

<div class="flex justify-between items-center pt-2">

<div class="text-xs text-gray-500">
${item.reporter || '-'}
</div>

<div class="text-xs text-gray-500">
${formatDate(item.date)}
</div>

</div>

<div class="flex gap-2 pt-3">

<button
onclick="editData('${item.id}')"
class="flex-1 bg-blue-500 text-white py-2 rounded-xl">

แก้ไข

</button>

<button
onclick="deleteData('${item.id}')"
class="flex-1 bg-red-500 text-white py-2 rounded-xl">

ลบ

</button>

</div>

</div>

</div>

`).join('');

}

function formatDate(date){

if(!date) return '';

return new Date(date)
.toLocaleDateString('th-TH');

}

function editData(id){

const item =
allData.find(d=>String(d.id)===String(id));

if(!item) return;

currentEditId = id;

switchTab('add');

document.getElementById('dateInput').value =
item.date;

document.getElementById('departmentInput').value =
item.department || '';

document.getElementById('subjectInput').value =
item.subject || '';

document.getElementById('riskLevelInput').value =
item.riskLevel || '';

document.getElementById('detailsInput').value =
item.details || '';

document.getElementById('solutionInput').value =
item.solution || '';

document.getElementById('reporterInput').value =
item.reporter || '';

}

async function deleteData(id){

const confirm =
await Swal.fire({
title:'ลบข้อมูล?',
icon:'warning',
showCancelButton:true
});

if(!confirm.isConfirmed) return;

const formData = new FormData();

formData.append('action','deleteData');

formData.append('id',id);

await fetch(SCRIPT_URL,{
method:'POST',
body:formData
});

loadData();

}

document
.getElementById('dataFormElement')
.addEventListener('submit',async function(e){

e.preventDefault();

const formData = new FormData();

formData.append(
'action',
currentEditId ? 'updateData':'addData'
);

if(currentEditId){

formData.append('id',currentEditId);

}

formData.append(
'date',
document.getElementById('dateInput').value
);

formData.append(
'department',
document.getElementById('departmentInput').value
);

formData.append(
'subject',
document.getElementById('subjectInput').value
);

formData.append(
'riskLevel',
document.getElementById('riskLevelInput').value
);

formData.append(
'details',
document.getElementById('detailsInput').value
);

formData.append(
'solution',
document.getElementById('solutionInput').value
);

formData.append(
'reporter',
document.getElementById('reporterInput').value
);

const file1 =
document.getElementById('file1Input').files[0];

const file2 =
document.getElementById('file2Input').files[0];

if(file1){

formData.append(
'file1',
await fileToBase64(file1)
);

formData.append(
'file1Name',
file1.name
);

}

if(file2){

formData.append(
'file2',
await fileToBase64(file2)
);

formData.append(
'file2Name',
file2.name
);

}

await fetch(SCRIPT_URL,{
method:'POST',
body:formData
});

Swal.fire({
icon:'success',
title:'บันทึกสำเร็จ',
timer:1500,
showConfirmButton:false
});

currentEditId = null;

document
.getElementById('dataFormElement')
.reset();

switchTab('data');

loadData();

});

document
.getElementById('searchInput')
.addEventListener('input',function(e){

const keyword =
e.target.value.toLowerCase();

const filtered =
allData.filter(item=>

(item.subject || '')
.toLowerCase()
.includes(keyword)

||

(item.details || '')
.toLowerCase()
.includes(keyword)

||

(item.department || '')
.toLowerCase()
.includes(keyword)

||

(item.reporter || '')
.toLowerCase()
.includes(keyword)

);

displayCards(filtered);

});

document.addEventListener('DOMContentLoaded',()=>{

document.getElementById('dateInput').value =
new Date().toISOString().split('T')[0];

loadData();

});

</script>

</body>
</html>


<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทะเบียนความเสี่ยง หน่วยไตเทียม สถาบันบำราศนราดูร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            box-sizing: border-box;
        }
        
        .card {
            transition: all 0.3s ease;
            height: 240px;
            display: flex;
            flex-direction: column;
        }
        
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 20px -5px rgba(0, 0, 0, 0.08), 0 8px 8px -5px rgba(0, 0, 0, 0.03);
        }
        
        .card-image {
            height: 120px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        @media (min-width: 640px) {
            .card {
                height: 280px;
            }
            
            .card-image {
                height: 160px;
            }
        }
        
        .card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .card-body {
            flex: 1;
            overflow: hidden;
        }
        
        .risk-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            white-space: nowrap;
        }
        
        .risk-high {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #dc2626;
        }
        
        .risk-medium {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            color: #d97706;
        }
        
        .risk-low {
            background: linear-gradient(135deg, #dcfce7, #bbf7d0);
            color: #16a34a;
        }
        
        .modal-backdrop {
            backdrop-filter: blur(8px);
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(59, 130, 246, 0.1), rgba(16, 185, 129, 0.1));
        }
        
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .animate-pulse-slow {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .animate-bounce-slow {
            animation: bounce 3s infinite;
        }
        
        .animate-spin-slow {
            animation: spin 3s linear infinite;
        }
        
        .animate-float {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .menu-item {
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            color: #64748b;
            border: 2px solid transparent;
        }
        
        .menu-item.active {
            background: linear-gradient(135deg, #0891b2, #06b6d4);
            color: white;
            border-color: #0891b2;
        }
        
        .menu-item:hover:not(.active) {
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            transform: translateX(4px);
        }
        
        .risk-stat-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .risk-stat-card:hover {
            transform: translateY(-2px) scale(1.02);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #0891b2, #06b6d4, #22d3ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #0891b2, #06b6d4);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #0e7490, #0891b2);
            transform: translateY(-1px);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #059669, #10b981);
        }
        
        .btn-success:hover {
            background: linear-gradient(135deg, #047857, #059669);
            transform: translateY(-1px);
        }
        
        .search-container {
            position: relative;
            overflow: hidden;
        }
        
        .search-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }
        
        .search-container:focus-within::before {
            left: 100%;
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        @media (max-width: 768px) {
            .card {
                height: auto;
                min-height: 260px;
            }
            
            .card-image {
                height: 120px;
            }
            
            body {
                font-size: 16px;
            }
            
            .card h3 {
                font-size: 1rem !important;
            }
            
            .card p {
                font-size: 0.9rem !important;
            }
            
            .card .text-xs {
                font-size: 0.8rem !important;
            }
            
            input, select, textarea {
                font-size: 16px !important;
            }
            
            button {
                font-size: 16px !important;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-teal-50 via-cyan-50 to-blue-50 min-h-full">

    <script>
        // ตัวแปรสำหรับจัดการข้อมูล
        let allData = [];
        let currentEditId = null;
        let currentEditData = null;
        let isSubmitting = false;
        let reporterChart = null;
        let riskChart = null;
        
        // URL ของ Google Apps Script
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwuZXpealGoAtm5c129us9TyqD4Kww5KOJ_BYUvzy1aXGQw_eqRNVekL15A8W9mz8tL/exec';
        
        // สีพาสเทลสำหรับกราฟ
        const pastelColors = [
            '#FFB3BA', '#FFDFBA', '#FFFFBA', '#BAFFC9', '#BAE1FF',
            '#E1BAFF', '#FFBAE1', '#C9FFBA', '#BADFFF', '#FFCBA4',
            '#D4BAFF', '#BAFFE1', '#FFE1BA', '#E1FFBA', '#BAC9FF'
        ];

        // ฟังก์ชันแปลงไฟล์เป็น Base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // ฟังก์ชันเปิด/ปิดเมนู
        function toggleMenu() {
            const sideMenu = document.getElementById('sideMenu');
            const menuOverlay = document.getElementById('menuOverlay');
            
            sideMenu.classList.toggle('-translate-x-full');
            menuOverlay.classList.toggle('hidden');
        }
        
        function closeMenu() {
            const sideMenu = document.getElementById('sideMenu');
            const menuOverlay = document.getElementById('menuOverlay');
            
            sideMenu.classList.add('-translate-x-full');
            menuOverlay.classList.add('hidden');
        }

        // ฟังก์ชันสลับแท็บ
        function switchTab(tab) {
            const addTab = document.getElementById('addTab');
            const dataTab = document.getElementById('dataTab');
            const dashboardTab = document.getElementById('dashboardTab');
            const addView = document.getElementById('addView');
            const dataView = document.getElementById('dataView');
            const dashboardView = document.getElementById('dashboardView');
            
            // ลบ active จากทุกแท็บ
            addTab.classList.remove('active');
            dataTab.classList.remove('active');
            dashboardTab.classList.remove('active');
            
            // ซ่อนทุกหน้า
            addView.classList.add('hidden');
            dataView.classList.add('hidden');
            dashboardView.classList.add('hidden');
            
            if (tab === 'add') {
                addTab.classList.add('active');
                addView.classList.remove('hidden');
                // รีเซ็ตฟอร์มเมื่อเปิดหน้าเพิ่มข้อมูล
                currentEditId = null;
                currentEditData = null;
                document.getElementById('formTitle').textContent = 'เพิ่มข้อมูลใหม่';
                document.getElementById('dataFormElement').reset();
                document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
            } else if (tab === 'data') {
                dataTab.classList.add('active');
                dataView.classList.remove('hidden');
            } else if (tab === 'dashboard') {
                dashboardTab.classList.add('active');
                dashboardView.classList.remove('hidden');
                initializeDashboard();
            }
            
            // ปิดเมนูหลังจากเลือก
            closeMenu();
        }
        
        // เริ่มต้นแดชบอร์ด
        function initializeDashboard() {
            populateYearFilter();
            updateDashboard();
        }
        
        // เติมข้อมูลปีในตัวกรอง
        function populateYearFilter() {
            const yearFilter = document.getElementById('yearFilter');
            const years = [...new Set(allData.map(item => new Date(item.date).getFullYear()))].sort((a, b) => b - a);
            
            yearFilter.innerHTML = '<option value="">ทุกปี</option>';
            years.forEach(year => {
                yearFilter.innerHTML += `<option value="${year}">${year + 543}</option>`;
            });
        }
        
        // อัปเดตแดชบอร์ด
        function updateDashboard() {
            const selectedMonth = document.getElementById('monthFilter').value;
            const selectedYear = document.getElementById('yearFilter').value;
            
            // กรองข้อมูลตามเดือนและปี
            let filteredData = allData;
            
            if (selectedMonth || selectedYear) {
                filteredData = allData.filter(item => {
                    const itemDate = new Date(item.date);
                    const itemMonth = String(itemDate.getMonth() + 1).padStart(2, '0');
                    const itemYear = itemDate.getFullYear();
                    
                    let matchMonth = !selectedMonth || itemMonth === selectedMonth;
                    let matchYear = !selectedYear || itemYear == selectedYear;
                    
                    return matchMonth && matchYear;
                });
            }
            
            updateRiskStatsCards(filteredData);
            updateCharts(filteredData);
        }
        
        // อัปเดตการ์ดสถิติความเสี่ยง
        function updateRiskStatsCards(data) {
            const riskLevels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I'];
            const riskCounts = {};
            
            // สีพาสเทลอ่อนสำหรับแต่ละระดับ
            const pastelBackgrounds = {
                'A': 'bg-gradient-to-br from-emerald-50 to-emerald-100',
                'B': 'bg-gradient-to-br from-green-50 to-green-100',
                'C': 'bg-gradient-to-br from-lime-50 to-lime-100',
                'D': 'bg-gradient-to-br from-yellow-50 to-yellow-100',
                'E': 'bg-gradient-to-br from-amber-50 to-amber-100',
                'F': 'bg-gradient-to-br from-orange-50 to-orange-100',
                'G': 'bg-gradient-to-br from-red-50 to-red-100',
                'H': 'bg-gradient-to-br from-rose-50 to-rose-100',
                'I': 'bg-gradient-to-br from-pink-50 to-pink-100'
            };
            
            const pastelTextColors = {
                'A': 'text-emerald-700',
                'B': 'text-green-700',
                'C': 'text-lime-700',
                'D': 'text-yellow-700',
                'E': 'text-amber-700',
                'F': 'text-orange-700',
                'G': 'text-red-700',
                'H': 'text-rose-700',
                'I': 'text-pink-700'
            };
            
            // นับจำนวนแต่ละระดับความเสี่ยง
            riskLevels.forEach(level => {
                riskCounts[level] = data.filter(item => item.riskLevel === level).length;
            });
            
            const container = document.getElementById('riskStatsCards');
            let cardsHTML = '';
            
            // สร้างการ์ดสำหรับทุกระดับความเสี่ยง A-I
            riskLevels.forEach(level => {
                const count = riskCounts[level];
                const bgClass = pastelBackgrounds[level];
                const textClass = pastelTextColors[level];
                
                cardsHTML += `
                    <div class="risk-stat-card ${bgClass} backdrop-blur-sm rounded-2xl shadow-md hover:shadow-lg p-3 sm:p-4 text-center animate-fade-in border border-white/30 transition-all duration-300">
                        <div class="text-xs sm:text-sm mb-2 font-semibold ${textClass}">ระดับความเสี่ยง ${level}</div>
                        <div class="text-2xl sm:text-3xl font-bold mb-1 ${textClass}">${count}</div>
                        <div class="text-xs ${textClass} opacity-80">รายการ</div>
                    </div>
                `;
            });
            
            container.innerHTML = cardsHTML;
        }
        
        // อัปเดตกราฟ
        function updateCharts(data) {
            updateReporterChart(data);
            updateRiskChart(data);
        }
        
        // อัปเดตกราฟผู้รายงาน
        function updateReporterChart(data) {
            const reporterCounts = {};
            data.forEach(item => {
                reporterCounts[item.reporter] = (reporterCounts[item.reporter] || 0) + 1;
            });
            
            const labels = Object.keys(reporterCounts);
            const values = Object.values(reporterCounts);
            const colors = labels.map((_, index) => pastelColors[index % pastelColors.length]);
            
            const ctx = document.getElementById('reporterChart').getContext('2d');
            
            if (reporterChart) {
                reporterChart.destroy();
            }
            
            reporterChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderColor: colors.map(color => color.replace('0.8', '1')),
                        borderWidth: 2,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 15,
                                usePointStyle: true,
                                font: {
                                    size: 12
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((context.parsed / total) * 100).toFixed(1);
                                    return `${context.label}: ${context.parsed} รายการ (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // อัปเดตกราฟระดับความเสี่ยง
        function updateRiskChart(data) {
            const riskCounts = {};
            const riskLevels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I'];
            
            riskLevels.forEach(level => {
                const count = data.filter(item => item.riskLevel === level).length;
                if (count > 0) {
                    riskCounts[level] = count;
                }
            });
            
            const labels = Object.keys(riskCounts);
            const values = Object.values(riskCounts);
            const colors = labels.map(level => {
                switch (level) {
                    case 'A': return '#10b981'; // เขียวมรกต
                    case 'B': return '#84cc16'; // เขียวมะนาว
                    case 'C': return '#06b6d4'; // ฟ้าอมเขียว
                    case 'D': return '#0ea5e9'; // ฟ้าใส
                    case 'E': return '#6366f1'; // น้ำเงินม่วง
                    case 'F': return '#8b5cf6'; // ม่วงแดง
                    case 'G': return '#f59e0b'; // เหลืองส้ม
                    case 'H': return '#f97316'; // ส้มแดง
                    case 'I': return '#ef4444'; // แดงเข้ม
                    default: return '#6b7280';
                }
            });
            
            const ctx = document.getElementById('riskChart').getContext('2d');
            
            if (riskChart) {
                riskChart.destroy();
            }
            
            riskChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderColor: colors.map(color => color + '80'),
                        borderWidth: 2,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 15,
                                usePointStyle: true,
                                font: {
                                    size: 12
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    const percentage = ((context.parsed / total) * 100).toFixed(1);
                                    return `ระดับ ${context.label}: ${context.parsed} รายการ (${percentage}%)`;
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // ฟังก์ชันช่วยเหลือสำหรับสีข้อความ
        function getTextColor(riskLevel) {
            switch (riskLevel) {
                case 'A':
                case 'B':
                case 'C': return 'text-green-600';
                case 'D':
                case 'E':
                case 'F': return 'text-orange-600';
                case 'G':
                case 'H':
                case 'I': return 'text-red-600';
                default: return 'text-gray-600';
            }
        }

        // โหลดข้อมูลจาก Google Sheets
        async function loadData() {
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getData`);
                const result = await response.json();
                
                if (result.success) {
                    allData = result.data;
                    displayCards(allData);
                    Swal.fire({
                        icon: 'success',
                        title: 'โหลดข้อมูลสำเร็จ',
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 2000,
                        timerProgressBar: true
                    });
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                console.error('Error loading data:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถโหลดข้อมูลได้ กรุณาตรวจสอบการเชื่อมต่อ',
                    confirmButtonColor: '#0891b2'
                });
                displayCards([]);
            }
        }

        // ฟังก์ชันช่วยเหลือ
        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('th-TH');
        }

        function getRiskClass(riskLevel) {
            switch (riskLevel) {
                case 'A':
                case 'B':
                case 'C': return 'risk-low';
                case 'D':
                case 'E':
                case 'F': return 'risk-medium';
                case 'G':
                case 'H':
                case 'I': return 'risk-high';
                default: return 'risk-medium';
            }
        }

        function truncateText(text, maxLength = 100) {
            if (!text) return '';
            return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
        }



// แก้ไขข้อมูล
function editData(id) {
    const item = allData.find(d => d.id === id);
    if (!item) return;

    // 1. สลับไปหน้าเพิ่มข้อมูลก่อน (เพื่อให้มัน Reset ค่าว่างๆ ไปก่อน)
    switchTab('add');

    // 2. จากนั้นค่อยเอาข้อมูลที่เราเลือก มาใส่ทับลงไป
    currentEditId = id;
    currentEditData = item;
    
    document.getElementById('formTitle').textContent = 'แก้ไขข้อมูล';
    
    // จัดการรูปแบบวันที่ (Google Sheet ส่งมาเป็นแบบมีตัว T เช่น 2026-04-07T...) 
    // เราต้องตัดเอาเฉพาะ YYYY-MM-DD เพื่อให้ช่อง input รับได้
    let dateValue = item.date;
    if (dateValue && dateValue.includes('T')) {
        dateValue = dateValue.split('T')[0];
    }
    
    document.getElementById('dateInput').value = dateValue;
    document.getElementById('subjectInput').value = item.subject;
    document.getElementById('riskLevelInput').value = item.riskLevel;
    document.getElementById('detailsInput').value = item.details;
    document.getElementById('solutionInput').value = item.solution || '';
    document.getElementById('reporterInput').value = item.reporter;
}

        // ลบข้อมูล
        async function deleteData(id) {
            const result = await Swal.fire({
                title: 'ยืนยันการลบ',
                text: 'คุณต้องการลบข้อมูลนี้หรือไม่?',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#6b7280',
                confirmButtonText: 'ลบ',
                cancelButtonText: 'ยกเลิก'
            });

            if (!result.isConfirmed) return;

            try {
                Swal.fire({
                    title: 'กำลังลบข้อมูล...',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });

                const formData = new FormData();
                formData.append('action', 'deleteData');
                formData.append('id', id);

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'ลบข้อมูลสำเร็จ',
                        toast: true,
                        position: 'top-end',
                        showConfirmButton: false,
                        timer: 2000,
                        timerProgressBar: true
                    });
                    loadData();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                console.error('Error deleting data:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถลบข้อมูลได้',
                    confirmButtonColor: '#0891b2'
                });
            }
        }

        }

        // เปิดรูปภาพขนาดเต็ม
        function openImageModal(imageUrl) {
            Swal.fire({
                imageUrl: imageUrl,
                imageAlt: 'รูปภาพ',
                showConfirmButton: false,
                showCloseButton: true,
                width: 'auto',
                padding: '1rem',
                background: 'rgba(0,0,0,0.9)',
                backdrop: 'rgba(0,0,0,0.8)'
            });
        }

        // จัดการการส่งฟอร์ม
        document.getElementById('dataFormElement').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (isSubmitting) return;
            
            const date = document.getElementById('dateInput').value;
            const subject = document.getElementById('subjectInput').value;
            const riskLevel = document.getElementById('riskLevelInput').value;
            const details = document.getElementById('detailsInput').value;
            const solution = document.getElementById('solutionInput').value;
            const reporter = document.getElementById('reporterInput').value;
            const file1Input = document.getElementById('file1Input');
            const file2Input = document.getElementById('file2Input');

            if (!date || !subject || !riskLevel || !reporter) {
                Swal.fire({
                    icon: 'warning',
                    title: 'ข้อมูลไม่ครบถ้วน',
                    text: 'กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน',
                    confirmButtonColor: '#0891b2'
                });
                return;
            }

            const isEdit = currentEditId !== null;
            isSubmitting = true;

            // แสดง Loading
            Swal.fire({
                title: isEdit ? 'กำลังแก้ไขข้อมูล...' : 'กำลังบันทึกข้อมูล...',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            try {
                // เตรียมข้อมูลสำหรับส่ง
                const formData = new FormData();
                formData.append('action', isEdit ? 'updateData' : 'addData');
                formData.append('date', date);
                formData.append('subject', subject);
                formData.append('riskLevel', riskLevel);
                formData.append('details', details);
                formData.append('solution', solution);
                formData.append('reporter', reporter);
                
                if (isEdit) {
                    formData.append('id', currentEditId);
                    formData.append('createdAt', currentEditData.createdAt);
                    formData.append('existingFile1', currentEditData.file1 || '');
                    formData.append('existingFile2', currentEditData.file2 || '');
                }
                
                // แปลงไฟล์เป็น Base64
                if (file1Input.files[0]) {
                    const file1Base64 = await fileToBase64(file1Input.files[0]);
                    formData.append('file1', file1Base64);
                    formData.append('file1Name', file1Input.files[0].name);
                }
                if (file2Input.files[0]) {
                    const file2Base64 = await fileToBase64(file2Input.files[0]);
                    formData.append('file2', file2Base64);
                    formData.append('file2Name', file2Input.files[0].name);
                }

                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    Swal.fire({
                        icon: 'success',
                        title: isEdit ? 'แก้ไขข้อมูลสำเร็จ!' : 'บันทึกข้อมูลสำเร็จ!',
                        text: 'ข้อมูลได้รับการบันทึกเรียบร้อยแล้ว',
                        confirmButtonColor: '#0891b2',
                        timer: 2000,
                        timerProgressBar: true
                    });
                    // กลับไปหน้าข้อมูลทั้งหมดหลังบันทึกสำเร็จ
                    switchTab('data');
                    loadData();
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                console.error('Error saving data:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถบันทึกข้อมูลได้ กรุณาลองใหม่อีกครั้ง',
                    confirmButtonColor: '#0891b2'
                });
            } finally {
                isSubmitting = false;
            }
        });

        // ค้นหาข้อมูล
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const filteredData = allData.filter(item => 
                item.subject.toLowerCase().includes(searchTerm) ||
                item.details.toLowerCase().includes(searchTerm) ||
                (item.solution && item.solution.toLowerCase().includes(searchTerm)) ||
                item.reporter.toLowerCase().includes(searchTerm) ||
                item.riskLevel.toLowerCase().includes(searchTerm)
            );
            displayCards(filteredData);
        });

        // โหลดข้อมูลเมื่อเริ่มต้น
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
        });
    </script>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทะเบียนความเสี่ยง หน่วยไตเทียม สถาบันบำราศนราดูร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { box-sizing: border-box; }
        .card { transition: all 0.3s ease; height: 100%; min-height: 280px; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 15px 20px -5px rgba(0, 0, 0, 0.08), 0 8px 8px -5px rgba(0, 0, 0, 0.03); }
        .card-image { height: 140px; object-fit: cover; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-content { flex: 1; display: flex; flex-direction: column; }
        .card-body { flex: 1; overflow: hidden; }
        .risk-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-align: center; white-space: nowrap; }
        .risk-high { background: linear-gradient(135deg, #fee2e2, #fecaca); color: #dc2626; }
        .risk-medium { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #d97706; }
        .risk-low { background: linear-gradient(135deg, #dcfce7, #bbf7d0); color: #16a34a; }
        .modal-backdrop { backdrop-filter: blur(8px); background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(59, 130, 246, 0.1), rgba(16, 185, 129, 0.1)); }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        .menu-item { background: linear-gradient(135deg, #f1f5f9, #e2e8f0); color: #64748b; border: 2px solid transparent; }
        .menu-item.active { background: linear-gradient(135deg, #0891b2, #06b6d4); color: white; border-color: #0891b2; }
        .menu-item:hover:not(.active) { background: linear-gradient(135deg, #e2e8f0, #cbd5e1); transform: translateX(4px); }
        .risk-stat-card { transition: all 0.3s ease; cursor: pointer; }
        .risk-stat-card:hover { transform: translateY(-2px) scale(1.02); }
        .gradient-text { background: linear-gradient(135deg, #0891b2, #06b6d4, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-primary { background: linear-gradient(135deg, #0891b2, #06b6d4); transition: all 0.3s ease; }
        .btn-primary:hover { background: linear-gradient(135deg, #0e7490, #0891b2); transform: translateY(-1px); }
        .search-container { position: relative; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        @media (max-width: 768px) {
            .card { min-height: 260px; }
            .card-image { height: 120px; }
            body { font-size: 16px; }
            .card h3 { font-size: 1rem !important; }
            .card p { font-size: 0.9rem !important; }
            .card .text-xs { font-size: 0.8rem !important; }
            input, select, textarea, button { font-size: 16px !important; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-teal-50 via-cyan-50 to-blue-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 relative w-full max-w-full">
        <div class="text-center mb-8 animate-fade-in relative w-full">
            <button id="menuToggle" onclick="toggleMenu()" class="absolute left-0 top-1/2 transform -translate-y-1/2 z-50 bg-white/90 backdrop-blur-sm rounded-xl shadow-lg p-4 sm:p-3 hover:bg-white transition-all">
                <i class="fas fa-bars text-teal-600 text-2xl sm:text-lg"></i>
            </button>
            
            <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-lg p-6 sm:p-8 w-full ml-16 sm:ml-0 mt-14 sm:mt-0">
                <h1 class="text-2xl sm:text-4xl font-bold text-gray-800 mb-2">
                    <i class="fas fa-heartbeat text-teal-600 mr-3 animate-pulse-slow"></i>
                    <span class="gradient-text">ทะเบียนความเสี่ยง</span>
                </h1>
                <h2 class="text-lg sm:text-2xl text-teal-700 font-medium">หน่วยไตเทียม สถาบันบำราศนราดูร</h2>
            </div>
        </div>

        <div id="sideMenu" class="fixed top-0 left-0 h-full w-full sm:w-64 bg-white/95 backdrop-blur-sm shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out z-40">
            <div class="p-6 pt-24 sm:pt-20">
                <h3 class="text-2xl sm:text-lg font-bold text-gray-800 mb-8 sm:mb-6 gradient-text text-center sm:text-left">เมนู</h3>
                <nav class="space-y-4 sm:space-y-3">
                    <button id="addTab" onclick="switchTab('add')" class="menu-item w-full text-left px-6 py-5 sm:px-4 sm:py-3 rounded-xl font-medium transition-all flex items-center gap-4 sm:gap-3 text-lg sm:text-base">
                        <i class="fas fa-plus text-xl sm:text-base"></i> เพิ่มข้อมูลใหม่
                    </button>
                    <button id="dataTab" onclick="switchTab('data')" class="menu-item active w-full text-left px-6 py-5 sm:px-4 sm:py-3 rounded-xl font-medium transition-all flex items-center gap-4 sm:gap-3 text-lg sm:text-base">
                        <i class="fas fa-list text-xl sm:text-base"></i> ข้อมูลทั้งหมด
                    </button>
                    <button id="dashboardTab" onclick="switchTab('dashboard')" class="menu-item w-full text-left px-6 py-5 sm:px-4 sm:py-3 rounded-xl font-medium transition-all flex items-center gap-4 sm:gap-3 text-lg sm:text-base">
                        <i class="fas fa-chart-pie text-xl sm:text-base"></i> แดชบอร์ด
                    </button>
                </nav>
            </div>
        </div>

        <div id="menuOverlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-30 hidden" onclick="closeMenu()"></div>

        <div id="addView" class="hidden">
            <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl p-4 sm:p-8 mb-8 animate-fade-in w-full max-w-5xl mx-auto">
                <div class="flex justify-between items-center mb-8 border-b pb-4">
                    <h2 id="formTitle" class="text-2xl sm:text-xl font-bold gradient-text"><i class="fas fa-pen-square mr-2"></i>เพิ่มข้อมูลใหม่</h2>
                </div>
                
                <form id="dataFormElement" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-lg sm:text-sm font-medium text-gray-700 mb-3">
                                <i class="fas fa-calendar text-blue-500 mr-2"></i>วันที่เกิดเหตุ
                            </label>
                            <input type="date" id="dateInput" required 
                                   class="w-full px-4 py-4 sm:px-3 sm:py-2 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-all text-lg sm:text-base">
                        </div>
                        
                        <div>
                            <label class="block text-lg sm:text-sm font-medium text-gray-700 mb-3">
                                <i class="fas fa-hospital-user text-teal-500 mr-2"></i>แผนก / หน่วยงาน
                            </label>
                            <select id="departmentInput" required 
                                    class="w-full px-4 py-4 sm:px-3 sm:py-2 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-all text-lg sm:text-base bg-white">
                                <option value="">-- เลือกแผนก --</option>
                                <option value="ไตเทียม 4/2">ไตเทียม 4/2</option>
                                <option value="ไตเทียม 5/1">ไตเทียม 5/1</option>
                                <option value="ไตเทียม 5/2">ไตเทียม 5/2</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-lg sm:text-sm font-medium text-gray-700 mb-3">
                                <i class="fas fa-heading text-blue-500 mr-2"></i>หัวข้อ
                            </label>
                            <input type="text" id="subjectInput" required 
                                   class="w-full px-4 py-4 sm:px-3 sm:py-2 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 transition-all text-lg sm:text-base"
                                   placeholder="ระบุหัวข้อความเสี่ยง">
                        </div>

                        <div>
                            <label class="block text-lg sm:text-sm font-medium text-gray-700 mb-3">
                                <i class="fas fa-exclamation-triangle text-orange-500 mr-2"></i>ระดับความเสี่ยง
                            </label>
                            <select id="riskLevelInput" required 
                                    class="w-full px-4 py-4 sm:px-3 sm:py-2 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 transition-all text-lg sm:text-base bg-white">
                                <option value="">-- เลือกระดับ --</option>
                                <option value="A">A (เกิดเหตุ แต่ยังไม่ถึงผู้ป่วย)</option>
                                <option value="B">B (เกิดกับผู้ป่วย แต่ไม่ได้รับอันตราย)</option>
                                <option value="C">C (เกิดกับผู้ป่วย ไม่ได้รับอันตราย แต่ต้องเฝ้าระวัง)</option>
                                <option value="D">D (ต้องให้การรักษาเพิ่มเติม)</option>
                                <option value="E">E (ต้องรับไว้รักษาในโรงพยาบาล/นอนนานขึ้น)</option>
                                <option value="F">F (อันตรายถึงขั้นต้องส่งต่อ/กู้ชีพ)</option>
                                <option value="G">G (พิการถาวร)</option>
                                <option value="H">H (ต้องกู้ชีพ และส่งผลถึงชีวิต)</option>
                                <option value="I">I (เสียชีวิต)</option>
                            </select>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-lg sm:text-sm font-medium text-gray-700 mb-3">
                            <i class="fas fa-align-left text-purple-500 mr-2"></i>รายละเอียด
                        </label>
                        <textarea id="detailsInput" rows="3" required
                                  class="w-full px-4 py-4 sm:px-3 sm:py-2 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 transition-all text-lg sm:text-base"
                                  placeholder="อธิบายรายละเอียดความเสี่ยง"></textarea>
                    </div>
                    
                    <div>
                        <label class="block text-lg sm:text-sm font-medium text-gray-700 mb-3">
                            <i class="fas fa-tools text-indigo-500 mr-2"></i>แนวทางการแก้ไข
                        </label>
                        <textarea id="solutionInput" rows="3" required
                                  class="w-full px-4 py-4 sm:px-3 sm:py-2 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 transition-all text-lg sm:text-base"
                                  placeholder="ระบุแนวทางการแก้ไขหรือป้องกัน"></textarea>
                    </div>
                    
                    <div>
                        <label class="block text-lg sm:text-sm font-medium text-gray-700 mb-3">
                            <i class="fas fa-user text-green-500 mr-2"></i>ผู้รายงาน
                        </label>
                        <input type="text" id="reporterInput" required 
                               class="w-full px-4 py-4 sm:px-3 sm:py-2 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 transition-all text-lg sm:text-base"
                               placeholder="ชื่อผู้รายงาน">
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <div>
                            <label class="block text-lg sm:text-sm font-medium text-gray-700 mb-3">
                                <i class="fas fa-image text-pink-500 mr-2"></i>แนบไฟล์ 1 (ถ้ามี)
                            </label>
                            <input type="file" id="file1Input" accept="image/*" 
                                   class="w-full px-4 py-3 sm:px-3 sm:py-2 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 transition-all text-base bg-white">
                        </div>
                        
                        <div>
                            <label class="block text-lg sm:text-sm font-medium text-gray-700 mb-3">
                                <i class="fas fa-image text-pink-500 mr-2"></i>แนบไฟล์ 2 (ถ้ามี)
                            </label>
                            <input type="file" id="file2Input" accept="image/*" 
                                   class="w-full px-4 py-3 sm:px-3 sm:py-2 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-teal-500 transition-all text-base bg-white">
                        </div>
                    </div>
                    
                    <div class="flex justify-end gap-3 pt-6 border-t border-gray-200">
                        <button type="submit" id="submitBtn"
                                class="w-full sm:w-auto btn-primary text-white px-8 py-4 sm:px-8 sm:py-3 rounded-lg transition-all shadow-lg text-lg sm:text-base font-bold">
                            <i class="fas fa-save mr-2 animate-float"></i>บันทึกข้อมูล
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div id="dataView" class="w-full">
            <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl p-4 sm:p-6 mb-8 animate-fade-in w-full max-w-3xl mx-auto">
                <div class="relative w-full search-container">
                    <input type="text" id="searchInput" placeholder="ค้นหา หัวข้อ, แผนก, หรือรายละเอียด..." 
                           class="pl-12 pr-4 py-4 sm:py-3 border-2 border-teal-200 rounded-xl focus:ring-2 focus:ring-teal-500 w-full bg-white transition-all text-base shadow-sm">
                    <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-teal-400 text-lg"></i>
                </div>
            </div>
            
            <div id="dataCardsContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6 w-full">
                <div class="col-span-full flex justify-center items-center py-16">
                    <div class="text-center">
                        <i class="fas fa-spinner fa-spin text-4xl text-teal-500 mb-4"></i>
                        <p class="text-gray-600">กำลังโหลดข้อมูล...</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="dashboardView" class="hidden w-full">
            <div class="bg-white/80 backdrop-blur-sm rounded-2xl shadow-xl p-4 sm:p-6 mb-8 animate-fade-in w-full">
                <div class="flex flex-wrap gap-3 sm:gap-4 justify-center items-center">
                    
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <i class="fas fa-hospital-user text-teal-500 w-5"></i>
                        <select id="dashboardDepartmentFilter" class="w-full sm:w-auto px-3 py-2 border-2 border-teal-200 rounded-xl focus:ring-2 focus:ring-teal-500 bg-white">
                            <option value="">ทุกแผนก / หน่วยงาน</option>
                            <option value="ไตเทียม 4/2">ไตเทียม 4/2</option>
                            <option value="ไตเทียม 5/1">ไตเทียม 5/1</option>
                            <option value="ไตเทียม 5/2">ไตเทียม 5/2</option>
                        </select>
                    </div>

                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <i class="fas fa-calendar-alt text-teal-500 w-5"></i>
                        <select id="monthFilter" class="w-full sm:w-auto px-3 py-2 border-2 border-teal-200 rounded-xl focus:ring-2 focus:ring-teal-500 bg-white">
                            <option value="">ทุกเดือน</option>
                            <option value="01">มกราคม</option>
                            <option value="02">กุมภาพันธ์</option>
                            <option value="03">มีนาคม</option>
                            <option value="04">เมษายน</option>
                            <option value="05">พฤษภาคม</option>
                            <option value="06">มิถุนายน</option>
                            <option value="07">กรกฎาคม</option>
                            <option value="08">สิงหาคม</option>
                            <option value="09">กันยายน</option>
                            <option value="10">ตุลาคม</option>
                            <option value="11">พฤศจิกายน</option>
                            <option value="12">ธันวาคม</option>
                        </select>
                    </div>
                    
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <i class="fas fa-calendar text-teal-500 w-5"></i>
                        <select id="yearFilter" class="w-full sm:w-auto px-3 py-2 border-2 border-teal-200 rounded-xl focus:ring-2 focus:ring-teal-500 bg-white">
                            <option value="">ทุกปี</option>
                        </select>
                    </div>
                    
                    <button onclick="updateDashboard()" class="w-full sm:w-auto btn-primary text-white px-6 py-2 rounded-xl font-bold shadow-md mt-2 sm:mt-0">
                        <i class="fas fa-filter mr-2"></i>กรองข้อมูล
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-5 xl:grid-cols-9 gap-3 sm:gap-4 mb-8 w-full" id="riskStatsCards"></div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8 w-full">
                <div class="bg-white/80 rounded-2xl shadow-xl p-6 animate-fade-in w-full">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center border-b pb-2"><i class="fas fa-users text-teal-500 mr-2"></i> สัดส่วนผู้รายงาน</h3>
                    <div class="w-full max-w-sm mx-auto h-64"><canvas id="reporterChart"></canvas></div>
                </div>
                <div class="bg-white/80 rounded-2xl shadow-xl p-6 animate-fade-in w-full">
                    <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center border-b pb-2"><i class="fas fa-exclamation-triangle text-orange-500 mr-2"></i> สัดส่วนระดับความเสี่ยง</h3>
                    <div class="w-full max-w-sm mx-auto h-64"><canvas id="riskChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/50 modal-backdrop hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-4xl max-h-full overflow-y-auto animate-fade-in">
            <div class="flex justify-between items-center p-6 border-b border-gray-200 sticky top-0 bg-white z-10">
                <h2 class="text-xl font-bold gradient-text"><i class="fas fa-info-circle mr-2"></i>รายละเอียดความเสี่ยง</h2>
                <button onclick="closeDetailModal()" class="text-gray-400 hover:text-red-500 text-3xl transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="detailContent" class="p-6"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwuZXpealGoAtm5c129us9TyqD4Kww5KOJ_BYUvzy1aXGQw_eqRNVekL15A8W9mz8tL/exec';
        
        let allData = [];
        let currentEditId = null;
        let currentEditData = null;
        let isSubmitting = false;
        let reporterChart = null;
        let riskChart = null;
        const pastelColors = ['#FFB3BA', '#FFDFBA', '#FFFFBA', '#BAFFC9', '#BAE1FF', '#E1BAFF', '#FFBAE1', '#C9FFBA', '#BADFFF', '#FFCBA4'];

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('-translate-x-full');
            document.getElementById('menuOverlay').classList.toggle('hidden');
        }
        
        function closeMenu() {
            document.getElementById('sideMenu').classList.add('-translate-x-full');
            document.getElementById('menuOverlay').classList.add('hidden');
        }

        function switchTab(tab, isEdit = false) {
            document.getElementById('addTab').classList.remove('active');
            document.getElementById('dataTab').classList.remove('active');
            document.getElementById('dashboardTab').classList.remove('active');
            document.getElementById('addView').classList.add('hidden');
            document.getElementById('dataView').classList.add('hidden');
            document.getElementById('dashboardView').classList.add('hidden');
            
            if (tab === 'add') {
                document.getElementById('addTab').classList.add('active');
                document.getElementById('addView').classList.remove('hidden');
                if (!isEdit) {
                    currentEditId = null;
                    currentEditData = null;
                    document.getElementById('formTitle').innerHTML = '<i class="fas fa-pen-square mr-2"></i>เพิ่มข้อมูลใหม่';
                    document.getElementById('dataFormElement').reset();
                    document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
                }
            } else if (tab === 'data') {
                document.getElementById('dataTab').classList.add('active');
                document.getElementById('dataView').classList.remove('hidden');
            } else if (tab === 'dashboard') {
                document.getElementById('dashboardTab').classList.add('active');
                document.getElementById('dashboardView').classList.remove('hidden');
                initializeDashboard();
            }
            closeMenu();
        }

        // จัดการ Dashboard
        function initializeDashboard() { 
            populateYearFilter(); 
            // ล้างค่าตัวกรองให้เป็นค่าเริ่มต้นทุกครั้งที่เข้าหน้า Dashboard
            document.getElementById('dashboardDepartmentFilter').value = "";
            document.getElementById('monthFilter').value = "";
            updateDashboard(); 
        }

        function populateYearFilter() {
            const yearFilter = document.getElementById('yearFilter');
            const years = [...new Set(allData.map(item => {
                const d = new Date(item.date);
                return isNaN(d) ? null : d.getFullYear();
            }).filter(y => y !== null))].sort((a, b) => b - a);
            
            yearFilter.innerHTML = '<option value="">ทุกปี</option>';
            years.forEach(year => yearFilter.innerHTML += `<option value="${year}">${year + 543}</option>`);
        }
        
        function updateDashboard() {
            const dept = document.getElementById('dashboardDepartmentFilter').value;
            const m = document.getElementById('monthFilter').value;
            const y = document.getElementById('yearFilter').value;
            
            let filteredData = allData.filter(item => {
                // กรองแผนก
                let matchDept = !dept || item['หน่วยงาน'] === dept;
                
                // กรองวันที่
                let matchDate = true;
                if (item.date) {
                    const d = new Date(item.date);
                    if (!isNaN(d)) {
                        let matchM = !m || String(d.getMonth() + 1).padStart(2, '0') === m;
                        let matchY = !y || d.getFullYear() == y;
                        matchDate = matchM && matchY;
                    } else if (m || y) {
                        matchDate = false; // ถ้าระบุเดือน/ปี แต่ไม่มีข้อมูลวันที่ ให้ตัดทิ้ง
                    }
                } else if (m || y) {
                    matchDate = false;
                }
                
                return matchDept && matchDate;
            });
            
            updateRiskStatsCards(filteredData);
            updateCharts(filteredData);
        }

        function updateRiskStatsCards(data) {
            const levels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I'];
            const container = document.getElementById('riskStatsCards');
            container.innerHTML = levels.map(level => {
                const count = data.filter(item => item.riskLevel === level).length;
                return `
                    <div class="risk-stat-card bg-white rounded-xl shadow-md p-3 text-center border-l-4 border-teal-400 hover:border-teal-600 transition-colors">
                        <div class="text-xs font-bold text-gray-500 mb-1">ระดับ ${level}</div>
                        <div class="text-2xl font-bold text-teal-600">${count}</div>
                    </div>`;
            }).join('');
        }

        function updateCharts(data) {
            // Reporter Chart
            const rCounts = {};
            data.forEach(item => rCounts[item.reporter] = (rCounts[item.reporter] || 0) + 1);
            if (reporterChart) reporterChart.destroy();
            reporterChart = new Chart(document.getElementById('reporterChart'), {
                type: 'doughnut',
                data: { labels: Object.keys(rCounts), datasets: [{ data: Object.values(rCounts), backgroundColor: pastelColors }] },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });

            // Risk Chart
            const riskCounts = {};
            data.forEach(item => {
                if(item.riskLevel) riskCounts[item.riskLevel] = (riskCounts[item.riskLevel] || 0) + 1;
            });
            if (riskChart) riskChart.destroy();
            riskChart = new Chart(document.getElementById('riskChart'), {
                type: 'pie',
                data: { labels: Object.keys(riskCounts), datasets: [{ data: Object.values(riskCounts), backgroundColor: pastelColors.slice(4) }] },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
            });
        }

        async function loadData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getData`);
                const result = await res.json();
                if (result.success) {
                    allData = result.data;
                    displayCards(allData);
                } else throw new Error(result.error);
            } catch (err) {
                console.error(err);
                document.getElementById('dataCardsContainer').innerHTML = `<div class="col-span-full text-center text-red-500 py-10">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>`;
            }
        }

        function displayCards(data) {
            const container = document.getElementById('dataCardsContainer');
            if (data.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-gray-500 py-16 text-lg"><i class="fas fa-box-open text-5xl text-gray-300 mb-4"></i><br>ไม่พบข้อมูล</div>`;
                return;
            }

            const sortedData = [...data].reverse();
            container.innerHTML = sortedData.map(item => `
                <div class="card bg-white rounded-2xl shadow-lg overflow-hidden cursor-pointer animate-fade-in hover:shadow-xl" onclick="viewDetail('${item.id}')">
                    <div class="card-image relative">
                        ${item.file1 ? `<img src="${item.file1}" class="w-full h-full object-cover">` : `<div class="w-full h-full bg-teal-100 flex items-center justify-center"><i class="fas fa-image text-teal-300 text-4xl"></i></div>`}
                        <div class="absolute top-3 right-3">
                            <span class="risk-badge ${getRiskClass(item.riskLevel)} shadow-sm">${item.riskLevel || 'N/A'}</span>
                        </div>
                        <div class="absolute top-3 left-3 flex gap-1">
                            <button onclick="event.stopPropagation(); editData('${item.id}')" class="bg-white/90 text-teal-600 hover:text-teal-800 p-2 rounded-lg shadow"><i class="fas fa-edit"></i></button>
                            <button onclick="event.stopPropagation(); deleteData('${item.id}')" class="bg-white/90 text-red-600 hover:text-red-800 p-2 rounded-lg shadow"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="card-content p-5">
                        <div class="card-body">
                            <h3 class="font-bold text-gray-800 text-base mb-2 line-clamp-2">${item.subject}</h3>
                            <div class="flex items-center text-teal-700 bg-teal-50 px-2 py-1 rounded w-fit text-xs mb-3 font-medium">
                                <i class="fas fa-hospital-user mr-1"></i> ${item['หน่วยงาน'] || 'ไม่ระบุแผนก'}
                            </div>
                            <p class="text-gray-600 text-sm line-clamp-2">${item.details || ''}</p>
                        </div>
                        <div class="flex justify-between items-center pt-3 mt-3 border-t border-gray-100">
                            <div class="text-gray-500 text-xs truncate mr-2"><i class="fas fa-user mr-1"></i>${item.reporter}</div>
                            <div class="text-gray-500 text-xs whitespace-nowrap"><i class="fas fa-calendar mr-1"></i>${formatDate(item.date)}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return isNaN(d) ? dateStr : d.toLocaleDateString('th-TH');
        }

        function getRiskClass(level) {
            if (['A','B','C'].includes(level)) return 'risk-low';
            if (['D','E','F'].includes(level)) return 'risk-medium';
            return 'risk-high';
        }

        function editData(id) {
            const item = allData.find(d => String(d.id) === String(id));
            if (!item) return;

            switchTab('add', true);
            currentEditId = id;
            currentEditData = item;
            document.getElementById('formTitle').innerHTML = '<i class="fas fa-edit mr-2"></i>แก้ไขข้อมูล';
            
            // Populate Fields
            let dValue = '';
            if (item.date) {
                const d = new Date(item.date);
                if (!isNaN(d)) dValue = d.toISOString().split('T')[0];
            }
            document.getElementById('dateInput').value = dValue;
            
            document.getElementById('departmentInput').value = item['หน่วยงาน'] || '';
            document.getElementById('subjectInput').value = item.subject || '';
            document.getElementById('riskLevelInput').value = item.riskLevel || '';
            document.getElementById('detailsInput').value = item.details || '';
            document.getElementById('solutionInput').value = item.solution || '';
            document.getElementById('reporterInput').value = item.reporter || '';
            document.getElementById('file1Input').value = '';
            document.getElementById('file2Input').value = '';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function viewDetail(id) {
            const item = allData.find(d => d.id === id);
            if (!item) return;

            document.getElementById('detailContent').innerHTML = `
                <div class="space-y-4">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100"><div class="text-sm text-gray-500 mb-1"><i class="fas fa-calendar mr-2"></i>วันที่</div><div class="font-bold text-lg text-blue-900">${formatDate(item.date)}</div></div>
                        <div class="bg-teal-50 p-4 rounded-xl border border-teal-100"><div class="text-sm text-gray-500 mb-1"><i class="fas fa-hospital-user mr-2"></i>แผนก / หน่วยงาน</div><div class="font-bold text-lg text-teal-900">${item['หน่วยงาน'] || '-'}</div></div>
                    </div>
                    <div class="bg-orange-50 p-4 rounded-xl border border-orange-100 flex justify-between items-center">
                        <div>
                            <div class="text-sm text-gray-500 mb-1"><i class="fas fa-exclamation-triangle mr-2"></i>ระดับความเสี่ยง</div>
                            <span class="risk-badge ${getRiskClass(item.riskLevel)} text-sm">${item.riskLevel}</span>
                        </div>
                    </div>
                    <div class="bg-gray-50 p-5 rounded-xl border border-gray-200">
                        <div class="text-sm text-gray-500 mb-2 border-b pb-2"><i class="fas fa-heading mr-2"></i>หัวข้อ</div>
                        <div class="font-bold text-xl text-gray-800">${item.subject}</div>
                    </div>
                    <div class="bg-gray-50 p-5 rounded-xl border border-gray-200">
                        <div class="text-sm text-gray-500 mb-2 border-b pb-2"><i class="fas fa-align-left mr-2"></i>รายละเอียด</div>
                        <div class="text-gray-700 whitespace-pre-wrap">${item.details || '-'}</div>
                    </div>
                    <div class="bg-gray-50 p-5 rounded-xl border border-gray-200">
                        <div class="text-sm text-gray-500 mb-2 border-b pb-2"><i class="fas fa-tools mr-2"></i>แนวทางแก้ไข</div>
                        <div class="text-gray-700 whitespace-pre-wrap">${item.solution || '-'}</div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl border border-gray-200">
                        <div class="text-sm text-gray-500 mb-1"><i class="fas fa-user mr-2"></i>ผู้รายงาน</div>
                        <div class="font-bold text-gray-700">${item.reporter || '-'}</div>
                    </div>
                    
                    ${(item.file1 || item.file2) ? `
                        <div class="mt-6 pt-4 border-t border-gray-200 bg-gray-50 p-5 rounded-xl">
                            <h3 class="font-bold text-gray-700 mb-3"><i class="fas fa-images mr-2 text-teal-600"></i>ไฟล์แนบ</h3>
                            <div class="flex gap-4 overflow-x-auto pb-2">
                                ${item.file1 ? `<img src="${item.file1}" class="h-40 object-cover rounded-lg shadow-md cursor-pointer hover:opacity-80 transition-opacity border border-gray-200" onclick="openImageModal('${item.file1}')">` : ''}
                                ${item.file2 ? `<img src="${item.file2}" class="h-40 object-cover rounded-lg shadow-md cursor-pointer hover:opacity-80 transition-opacity border border-gray-200" onclick="openImageModal('${item.file2}')">` : ''}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeDetailModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function openImageModal(url) { Swal.fire({ imageUrl: url, showConfirmButton: false, showCloseButton: true, background: 'rgba(0,0,0,0.9)', backdrop: 'rgba(0,0,0,0.8)', padding: '1rem' }); }

        async function deleteData(id) {
            const res = await Swal.fire({ title: 'ยืนยันการลบ?', text: "ข้อมูลจะไม่สามารถกู้คืนได้!", icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'ลบข้อมูล', cancelButtonText: 'ยกเลิก' });
            if (!res.isConfirmed) return;

            Swal.fire({ title: 'กำลังลบ...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            try {
                const fd = new FormData(); fd.append('action', 'deleteData'); fd.append('id', id);
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: fd });
                const result = await response.json();
                if (result.success) {
                    Swal.fire({ icon: 'success', title: 'ลบสำเร็จ', timer: 1500, showConfirmButton: false });
                    loadData();
                } else throw new Error(result.error);
            } catch (err) { Swal.fire({ icon: 'error', title: 'ลบไม่สำเร็จ', text: 'โปรดลองใหม่อีกครั้ง' }); }
        }

        document.getElementById('dataFormElement').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (isSubmitting) return;

            const date = document.getElementById('dateInput').value;
            const department = document.getElementById('departmentInput').value;
            const subject = document.getElementById('subjectInput').value;
            const riskLevel = document.getElementById('riskLevelInput').value;
            const details = document.getElementById('detailsInput').value;
            const solution = document.getElementById('solutionInput').value;
            const reporter = document.getElementById('reporterInput').value;
            const f1 = document.getElementById('file1Input');
            const f2 = document.getElementById('file2Input');

            if (!date || !department || !subject || !riskLevel || !reporter) {
                Swal.fire({ icon: 'warning', title: 'กรอกข้อมูลให้ครบถ้วน' });
                return;
            }

            isSubmitting = true;
            Swal.fire({ title: currentEditId ? 'กำลังบันทึกการแก้ไข...' : 'กำลังบันทึกข้อมูล...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const fd = new FormData();
                fd.append('action', currentEditId ? 'updateData' : 'addData');
                fd.append('date', date);
                fd.append('department', department);
                fd.append('subject', subject);
                fd.append('riskLevel', riskLevel);
                fd.append('details', details);
                fd.append('solution', solution);
                fd.append('reporter', reporter);
                
                if (currentEditId) {
                    fd.append('id', currentEditId);
                    fd.append('existingFile1', currentEditData.file1 || '');
                    fd.append('existingFile2', currentEditData.file2 || '');
                }

                if (f1.files[0]) { fd.append('file1', await fileToBase64(f1.files[0])); fd.append('file1Name', f1.files[0].name); }
                if (f2.files[0]) { fd.append('file2', await fileToBase64(f2.files[0])); fd.append('file2Name', f2.files[0].name); }

                const response = await fetch(SCRIPT_URL, { method: 'POST', body: fd });
                const result = await response.json();

                if (result.success) {
                    Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', timer: 1500, showConfirmButton: false });
                    switchTab('data');
                    loadData();
                } else throw new Error(result.error);
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถบันทึกได้ กรุณาลองใหม่' });
            } finally { isSubmitting = false; }
        });

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const filtered = allData.filter(i => 
                (i.subject && i.subject.toLowerCase().includes(term)) || 
                (i['หน่วยงาน'] && i['หน่วยงาน'].toLowerCase().includes(term)) ||
                (i.details && i.details.toLowerCase().includes(term)) ||
                (i.reporter && i.reporter.toLowerCase().includes(term))
            );
            displayCards(filtered);
        });

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>

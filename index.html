<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทะเบียนความเสี่ยง หน่วยไตเทียม สถาบันบำราศนราดูร</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { box-sizing: border-box; }
        .card { transition: all 0.3s ease; height: 100%; min-height: 280px; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 15px 20px -5px rgba(0, 0, 0, 0.08), 0 8px 8px -5px rgba(0, 0, 0, 0.03); }
        .card-image { height: 140px; object-fit: cover; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-content { flex: 1; display: flex; flex-direction: column; }
        .card-body { flex: 1; overflow: hidden; }
        .risk-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-align: center; white-space: nowrap; }
        .risk-high { background: linear-gradient(135deg, #fee2e2, #fecaca); color: #dc2626; }
        .risk-medium { background: linear-gradient(135deg, #fef3c7, #fde68a); color: #d97706; }
        .risk-low { background: linear-gradient(135deg, #dcfce7, #bbf7d0); color: #16a34a; }
        .modal-backdrop { backdrop-filter: blur(8px); background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(59, 130, 246, 0.1), rgba(16, 185, 129, 0.1)); }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-pulse-slow { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .menu-item { background: linear-gradient(135deg, #f1f5f9, #e2e8f0); color: #64748b; border: 2px solid transparent; }
        .menu-item.active { background: linear-gradient(135deg, #0891b2, #06b6d4); color: white; border-color: #0891b2; }
        .menu-item:hover:not(.active) { background: linear-gradient(135deg, #e2e8f0, #cbd5e1); transform: translateX(4px); }
        .gradient-text { background: linear-gradient(135deg, #0891b2, #06b6d4, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .btn-primary { background: linear-gradient(135deg, #0891b2, #06b6d4); transition: all 0.3s ease; }
        .btn-primary:hover { background: linear-gradient(135deg, #0e7490, #0891b2); transform: translateY(-1px); }
        
        /* สไตล์สำหรับ Scrollbar ในตาราง */
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gradient-to-br from-teal-50 via-cyan-50 to-blue-50 min-h-screen text-gray-800 font-sans">
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative">

        <div id="sideMenu" class="fixed top-0 left-0 h-full w-full sm:w-72 bg-white/95 backdrop-blur-sm shadow-2xl transform -translate-x-full transition-transform duration-300 ease-in-out z-50">

        <div id="dashboardView" class="hidden w-full animate-fade-in">

                    </div>
                    
                    <div class="flex items-center gap-2 w-full sm:w-auto">
                        <i class="fas fa-calendar text-teal-500 text-lg"></i>
                        <select id="yearFilter" class="w-full sm:w-auto px-4 py-2 border-2 border-teal-200 rounded-xl focus:ring-2 focus:ring-teal-500 bg-white font-medium">
                            <option value="">-- ทุกปี --</option>

                    <button onclick="updateDashboard()" class="w-full sm:w-auto btn-primary text-white px-6 py-2.5 rounded-xl font-bold shadow-md">

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8 w-full">
                <div class="bg-white/90 rounded-2xl shadow-xl p-6 w-full">

                </div>
                <div class="bg-white/90 rounded-2xl shadow-xl p-6 w-full">

    <div id="riskTableModal" class="fixed inset-0 bg-black/50 modal-backdrop hidden z-[55] flex items-center justify-center p-4">

    <script>
        // เปลี่ยนเป็น SCRIPT_URL ที่ Deploy
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwuZXpealGoAtm5c129us9TyqD4Kww5KOJ_BYUvzy1aXGQw_eqRNVekL15A8W9mz8tL/exec';
        
        let allData = [];
        let currentEditId = null;
        let currentEditData = null;
        let isSubmitting = false;
        let reporterChart = null;
        let riskChart = null;
        const pastelColors = ['#FFB3BA', '#FFDFBA', '#FFFFBA', '#BAFFC9', '#BAE1FF', '#E1BAFF', '#FFBAE1', '#C9FFBA', '#BADFFF', '#FFCBA4'];

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function toggleMenu() {
            document.getElementById('sideMenu').classList.toggle('-translate-x-full');
            document.getElementById('menuOverlay').classList.toggle('hidden');
        }
        
        function closeMenu() {
            document.getElementById('sideMenu').classList.add('-translate-x-full');
            document.getElementById('menuOverlay').classList.add('hidden');
        }

        function switchTab(tab, isEdit = false) {
            ['addTab', 'dataTab', 'dashboardTab'].forEach(t => document.getElementById(t).classList.remove('active'));
            ['addView', 'dataView', 'dashboardView'].forEach(v => document.getElementById(v).classList.add('hidden'));
            
            document.getElementById(tab + 'Tab').classList.add('active');
            document.getElementById(tab + 'View').classList.remove('hidden');
            
            if (tab === 'add' && !isEdit) {
                currentEditId = null; currentEditData = null;
                document.getElementById('formTitle').innerHTML = '<i class="fas fa-pen-square mr-2"></i>เพิ่มข้อมูลใหม่';
                document.getElementById('dataFormElement').reset();
                document.getElementById('dateInput').value = new Date().toISOString().split('T')[0];
            } else if (tab === 'dashboard') {
                initializeDashboard();
            }
            closeMenu();
        }

        // ================= DASHBOARD & TABLE LIST =================
        function initializeDashboard() { 
            populateYearFilter(); 
            document.getElementById('dashboardDepartmentFilter').value = "";
            document.getElementById('monthFilter').value = "";
            updateDashboard(); 
        }

        function populateYearFilter() {
            const yFilter = document.getElementById('yearFilter');
            const years = [...new Set(allData.map(item => {
                const d = new Date(item.date);
                return isNaN(d) ? null : d.getFullYear();
            }).filter(y => y !== null))].sort((a, b) => b - a);
            
            yFilter.innerHTML = '<option value="">-- ทุกปี --</option>';
            years.forEach(year => yFilter.innerHTML += `<option value="${year}">${year + 543}</option>`);
        }
        
        function updateDashboard() {
            const dept = document.getElementById('dashboardDepartmentFilter').value;
            const m = document.getElementById('monthFilter').value;
            const y = document.getElementById('yearFilter').value;
            
            let filteredData = allData.filter(item => {
                let matchDept = !dept || item['หน่วยงาน'] === dept;
                let matchDate = true;
                if (item.date) {
                    const d = new Date(item.date);
                    if (!isNaN(d)) {
                        let matchM = !m || String(d.getMonth() + 1).padStart(2, '0') === m;
                        let matchY = !y || d.getFullYear() == y;
                        matchDate = matchM && matchY;
                    } else if (m || y) matchDate = false;
                } else if (m || y) matchDate = false;
                
                return matchDept && matchDate;
            });
            
            updateRiskStatsCards(filteredData);
            updateCharts(filteredData);
        }

        // ฟังก์ชันสร้างการ์ดพร้อมใส่ onclick สำหรับเปิดตาราง
        function updateRiskStatsCards(data) {
            const levels = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I'];
            document.getElementById('riskStatsCards').innerHTML = levels.map(level => {
                const count = data.filter(item => item.riskLevel === level).length;
                return `
                    <div onclick="showRiskTable('${level}')" class="bg-white rounded-xl shadow p-3 text-center border-b-4 border-teal-400 cursor-pointer hover:bg-teal-50 transition-colors transform hover:-translate-y-1">
                        <div class="text-xs font-bold text-gray-500 mb-1">ระดับ ${level}</div>
                        <div class="text-2xl font-bold text-teal-600">${count}</div>
                    </div>`;
            }).join('');
        }

        // ฟังก์ชันแสดงตารางแยกตามระดับ (เจาะลึก Dashboard)
        function showRiskTable(level) {
            const dept = document.getElementById('dashboardDepartmentFilter').value;
            const m = document.getElementById('monthFilter').value;
            const y = document.getElementById('yearFilter').value;
            
            let filteredData = allData.filter(item => {
                let matchDept = !dept || item['หน่วยงาน'] === dept;
                let matchDate = true;
                if (item.date) {
                    const d = new Date(item.date);
                    if (!isNaN(d)) {
                        let matchM = !m || String(d.getMonth() + 1).padStart(2, '0') === m;
                        let matchY = !y || d.getFullYear() == y;
                        matchDate = matchM && matchY;
                    } else if (m || y) matchDate = false;
                } else if (m || y) matchDate = false;
                
                return matchDept && matchDate && item.riskLevel === level;
            });

            document.getElementById('riskTableTitle').innerHTML = `<i class="fas fa-list mr-2"></i>รายการความเสี่ยง ระดับ ${level}`;
            const tbody = document.getElementById('riskTableBody');
            
            if (filteredData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center p-6 text-gray-500">ไม่พบข้อมูล</td></tr>`;
            } else {
                tbody.innerHTML = filteredData.reverse().map(item => `
                    <tr class="border-b hover:bg-teal-50/50 transition-colors">
                        <td class="p-3 whitespace-nowrap text-sm text-gray-600">${formatDate(item.date)}</td>
                        <td class="p-3 whitespace-nowrap">
                            <span class="bg-teal-100 text-teal-800 px-2 py-1 rounded text-xs font-medium"><i class="fas fa-hospital-user mr-1"></i>${item['หน่วยงาน'] || '-'}</span>
                        </td>
                        <td class="p-3 font-bold text-gray-800">${item.subject}</td>
                        <td class="p-3 text-gray-600 text-sm hidden md:table-cell max-w-xs truncate" title="${item.details || ''}">${item.details || '-'}</td>
                        <td class="p-3 whitespace-nowrap text-center">
                            <button onclick="viewDetail('${item.id}')" class="text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 p-2 rounded-lg mx-1 transition-colors" title="ดูรายละเอียด"><i class="fas fa-eye"></i></button>
                            <button onclick="closeRiskTableModal(); editData('${item.id}')" class="text-teal-500 hover:text-teal-700 bg-teal-50 hover:bg-teal-100 p-2 rounded-lg mx-1 transition-colors" title="แก้ไข"><i class="fas fa-edit"></i></button>
                            <button onclick="closeRiskTableModal(); deleteData('${item.id}')" class="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 p-2 rounded-lg mx-1 transition-colors" title="ลบ"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            }
            document.getElementById('riskTableModal').classList.remove('hidden');
        }

        function closeRiskTableModal() {
            document.getElementById('riskTableModal').classList.add('hidden');
        }

        function updateCharts(data) {
            const rCounts = {};
            data.forEach(item => { if(item.reporter) rCounts[item.reporter] = (rCounts[item.reporter] || 0) + 1; });
            if (reporterChart) reporterChart.destroy();
            reporterChart = new Chart(document.getElementById('reporterChart'), {
                type: 'doughnut', data: { labels: Object.keys(rCounts), datasets: [{ data: Object.values(rCounts), backgroundColor: pastelColors }] },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
            });

            const riskCounts = {};
            data.forEach(item => { if(item.riskLevel) riskCounts[item.riskLevel] = (riskCounts[item.riskLevel] || 0) + 1; });
            if (riskChart) riskChart.destroy();
            riskChart = new Chart(document.getElementById('riskChart'), {
                type: 'pie', data: { labels: Object.keys(riskCounts), datasets: [{ data: Object.values(riskCounts), backgroundColor: pastelColors.slice(4) }] },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'right' } } }
            });
        }

        // ================= FETCH DATA =================
        async function loadData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=getData`);
                const result = await res.json();
                if (result.success) {
                    allData = result.data;
                    displayCards(allData);
                } else throw new Error(result.error);
            } catch (err) {
                document.getElementById('dataCardsContainer').innerHTML = `<div class="col-span-full text-center text-red-500 py-10">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>`;
            }
        }

        function displayCards(data) {
            const container = document.getElementById('dataCardsContainer');
            if (data.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-gray-400 py-16"><i class="fas fa-box-open text-5xl mb-4"></i><p>ไม่พบข้อมูล</p></div>`;
                return;
            }

            container.innerHTML = [...data].reverse().map(item => `
                <div class="card bg-white rounded-2xl shadow-md overflow-hidden cursor-pointer" onclick="viewDetail('${item.id}')">
                    <div class="card-image relative">
                        ${item.file1 ? `<img src="${item.file1}" class="w-full h-full object-cover">` : `<div class="w-full h-full bg-teal-100 flex items-center justify-center"><i class="fas fa-image text-teal-300 text-4xl"></i></div>`}
                        <div class="absolute top-3 right-3"><span class="risk-badge ${getRiskClass(item.riskLevel)} shadow-sm">${item.riskLevel || '-'}</span></div>
                        <div class="absolute top-3 left-3 flex gap-1">
                            <button onclick="event.stopPropagation(); editData('${item.id}')" class="bg-white/90 text-teal-600 hover:text-teal-800 p-2 rounded-lg"><i class="fas fa-edit"></i></button>
                            <button onclick="event.stopPropagation(); deleteData('${item.id}')" class="bg-white/90 text-red-600 hover:text-red-800 p-2 rounded-lg"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="card-content p-5">
                        <h3 class="font-bold text-gray-800 text-base mb-2 line-clamp-2">${item.subject}</h3>
                        <div class="text-teal-700 bg-teal-50 px-2 py-1 rounded text-xs mb-3 inline-block font-medium"><i class="fas fa-hospital-user mr-1"></i>${item['หน่วยงาน'] || '-'}</div>
                        <p class="text-gray-600 text-sm line-clamp-2">${item.details || ''}</p>
                        <div class="flex justify-between items-center pt-3 mt-auto border-t border-gray-100 text-gray-500 text-xs">
                            <span class="truncate mr-2"><i class="fas fa-user mr-1"></i>${item.reporter}</span>
                            <span class="whitespace-nowrap"><i class="fas fa-calendar mr-1"></i>${formatDate(item.date)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return isNaN(d) ? dateStr : d.toLocaleDateString('th-TH');
        }

        function getRiskClass(level) {
            if (['A','B','C'].includes(level)) return 'risk-low';
            if (['D','E','F'].includes(level)) return 'risk-medium';
            return 'risk-high';
        }

        // ================= ACTIONS =================
        function editData(id) {
            const item = allData.find(d => String(d.id) === String(id));
            if (!item) return;

            switchTab('add', true);
            currentEditId = id; currentEditData = item;
            document.getElementById('formTitle').innerHTML = '<i class="fas fa-edit mr-2"></i>แก้ไขข้อมูล';
            
            let dValue = '';
            if (item.date && !isNaN(new Date(item.date))) dValue = new Date(item.date).toISOString().split('T')[0];
            document.getElementById('dateInput').value = dValue;
            
            document.getElementById('departmentInput').value = item['หน่วยงาน'] || '';
            document.getElementById('subjectInput').value = item.subject || '';
            document.getElementById('riskLevelInput').value = item.riskLevel || '';
            document.getElementById('detailsInput').value = item.details || '';
            document.getElementById('solutionInput').value = item.solution || '';
            document.getElementById('reporterInput').value = item.reporter || '';
            document.getElementById('file1Input').value = ''; document.getElementById('file2Input').value = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function viewDetail(id) {
            const item = allData.find(d => d.id === id);
            if (!item) return;
            document.getElementById('detailContent').innerHTML = `
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gray-50 p-4 rounded-xl border"><div class="text-sm text-gray-500 mb-1"><i class="fas fa-calendar text-blue-500 mr-1"></i> วันที่</div><div class="font-bold">${formatDate(item.date)}</div></div>
                        <div class="bg-gray-50 p-4 rounded-xl border"><div class="text-sm text-gray-500 mb-1"><i class="fas fa-hospital-user text-teal-500 mr-1"></i> แผนก</div><div class="font-bold text-teal-700">${item['หน่วยงาน'] || '-'}</div></div>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl border"><div class="text-sm text-gray-500 mb-1">ระดับความเสี่ยง</div><span class="risk-badge ${getRiskClass(item.riskLevel)}">${item.riskLevel}</span></div>
                    <div class="bg-gray-50 p-4 rounded-xl border"><div class="text-sm text-gray-500 mb-1">หัวข้อ</div><div class="font-bold text-lg">${item.subject}</div></div>
                    <div class="bg-gray-50 p-4 rounded-xl border"><div class="text-sm text-gray-500 mb-1">รายละเอียด</div><div class="whitespace-pre-wrap">${item.details || '-'}</div></div>
                    <div class="bg-gray-50 p-4 rounded-xl border"><div class="text-sm text-gray-500 mb-1">แนวทางแก้ไข</div><div class="whitespace-pre-wrap">${item.solution || '-'}</div></div>
                    <div class="bg-gray-50 p-4 rounded-xl border"><div class="text-sm text-gray-500 mb-1"><i class="fas fa-user text-green-500 mr-1"></i> ผู้รายงาน</div><div class="font-bold">${item.reporter || '-'}</div></div>
                    ${(item.file1 || item.file2) ? `
                        <div class="mt-4 pt-4 border-t"><h3 class="font-bold mb-3"><i class="fas fa-images text-pink-500 mr-2"></i>ไฟล์แนบ</h3><div class="flex gap-4">
                            ${item.file1 ? `<img src="${item.file1}" class="h-32 object-cover rounded-lg border shadow-sm cursor-pointer hover:opacity-80 transition-opacity" onclick="openImageModal('${item.file1}')">` : ''}
                            ${item.file2 ? `<img src="${item.file2}" class="h-32 object-cover rounded-lg border shadow-sm cursor-pointer hover:opacity-80 transition-opacity" onclick="openImageModal('${item.file2}')">` : ''}
                        </div></div>` : ''}
                </div>`;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeDetailModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function openImageModal(url) { Swal.fire({ imageUrl: url, showConfirmButton: false, showCloseButton: true, background: 'rgba(0,0,0,0.9)', padding: '1rem' }); }

        async function deleteData(id) {
            const res = await Swal.fire({ title: 'ลบข้อมูล?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', confirmButtonText: 'ลบข้อมูล', cancelButtonText: 'ยกเลิก' });
            if (!res.isConfirmed) return;
            Swal.fire({ title: 'กำลังลบ...', didOpen: () => Swal.showLoading() });
            try {
                const payload = { action: 'deleteData', id: id };
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                if ((await response.json()).success) { 
                    Swal.fire({ icon: 'success', title: 'ลบสำเร็จ', timer: 1500, showConfirmButton: false }); 
                    loadData(); 
                }
            } catch (err) { Swal.fire({ icon: 'error', title: 'ลบไม่สำเร็จ' }); }
        }

        // ================= SUBMIT DATA =================
        document.getElementById('dataFormElement').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (isSubmitting) return;

            isSubmitting = true;
            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const payload = {
                    action: currentEditId ? 'updateData' : 'addData',
                    date: document.getElementById('dateInput').value,
                    department: document.getElementById('departmentInput').value,
                    subject: document.getElementById('subjectInput').value,
                    riskLevel: document.getElementById('riskLevelInput').value,
                    details: document.getElementById('detailsInput').value,
                    solution: document.getElementById('solutionInput').value,
                    reporter: document.getElementById('reporterInput').value
                };

                if (currentEditId) {
                    payload.id = currentEditId;
                    payload.existingFile1 = currentEditData.file1 || '';
                    payload.existingFile2 = currentEditData.file2 || '';
                }

                const f1 = document.getElementById('file1Input').files[0];
                const f2 = document.getElementById('file2Input').files[0];
                
                if (f1) { payload.file1 = await fileToBase64(f1); payload.file1Name = f1.name; }
                if (f2) { payload.file2 = await fileToBase64(f2); payload.file2Name = f2.name; }

                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();
                
                if (result.success) {
                    Swal.fire({ icon: 'success', title: 'สำเร็จ!', timer: 1500, showConfirmButton: false });
                    switchTab('data'); 
                    loadData();
                } else throw new Error();
            } catch (err) { 
                Swal.fire({ icon: 'error', title: 'บันทึกไม่สำเร็จ', text: 'โปรดตรวจสอบการเชื่อมต่อ หรือขนาดไฟล์ใหญ่เกินไป' }); 
            }
            finally { isSubmitting = false; }
        });

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            displayCards(allData.filter(i => ['subject','หน่วยงาน','details','reporter'].some(k => i[k] && i[k].toLowerCase().includes(term))));
        });

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ทะเบียนความเสี่ยง หน่วยไตเทียม</title>

  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:'Kanit',sans-serif;
    }

    body{
      background:#f4f7fb;
      padding:15px;
      color:#333;
    }

    .container{
      max-width:1400px;
      margin:auto;
    }

    .card{
      background:#fff;
      border-radius:18px;
      padding:20px;
      box-shadow:0 5px 20px rgba(0,0,0,0.08);
      margin-bottom:20px;
    }

    h1{
      text-align:center;
      color:#00796b;
      margin-bottom:20px;
      font-size:30px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:15px;
    }

    .form-group{
      display:flex;
      flex-direction:column;
    }

    label{
      margin-bottom:6px;
      font-weight:500;
      color:#555;
    }

    input,select,textarea{
      padding:12px;
      border:1px solid #ccc;
      border-radius:12px;
      font-size:15px;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    .btn-group{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:20px;
    }

    button{
      border:none;
      padding:12px 18px;
      border-radius:12px;
      cursor:pointer;
      font-size:15px;
      font-weight:600;
      transition:0.2s;
    }

    .btn-save{
      background:#00796b;
      color:#fff;
    }

    .btn-save:hover{
      background:#00695c;
    }

    .btn-clear{
      background:#78909c;
      color:#fff;
    }

    .btn-clear:hover{
      background:#607d8b;
    }

    .table-container{
      overflow:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
      min-width:1200px;
    }

    th{
      background:#00796b;
      color:#fff;
      padding:12px;
      font-size:14px;
      text-align:left;
    }

    td{
      padding:10px;
      border-bottom:1px solid #eee;
      vertical-align:top;
      font-size:14px;
    }

    tr:hover{
      background:#f1fdfb;
    }

    .badge{
      padding:5px 10px;
      border-radius:30px;
      color:#fff;
      font-size:13px;
      font-weight:600;
      display:inline-block;
    }

    .low{
      background:#43a047;
    }

    .medium{
      background:#fb8c00;
    }

    .high{
      background:#e53935;
    }

    .img-preview{
      width:70px;
      height:70px;
      object-fit:cover;
      border-radius:10px;
      border:1px solid #ddd;
      cursor:pointer;
    }

    .action-btn{
      padding:7px 12px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:13px;
      margin-bottom:5px;
      width:100%;
    }

    .edit-btn{
      background:#1e88e5;
      color:#fff;
    }

    .delete-btn{
      background:#e53935;
      color:#fff;
    }

    .loading{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,0.8);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      font-size:22px;
      color:#00796b;
      font-weight:600;
    }

    @media(max-width:768px){
      h1{
        font-size:24px;
      }

      table{
        font-size:13px;
      }
    }
  </style>
</head>

<body>

<div class="loading" id="loading">
  กำลังประมวลผล...
</div>

<div class="container">

  <div class="card">
    <h1>ทะเบียนความเสี่ยง หน่วยไตเทียม</h1>

    <input type="hidden" id="recordId">

    <div class="grid">

      <div class="form-group">
        <label>วันที่</label>
        <input type="date" id="date">
      </div>

      <div class="form-group">
        <label>หัวข้อความเสี่ยง</label>
        <input type="text" id="subject" placeholder="ระบุหัวข้อความเสี่ยง">
      </div>

      <div class="form-group">
        <label>ระดับความเสี่ยง</label>
        <select id="riskLevel">
          <option value="ต่ำ">ต่ำ</option>
          <option value="ปานกลาง">ปานกลาง</option>
          <option value="สูง">สูง</option>
        </select>
      </div>

      <div class="form-group">
        <label>ผู้รายงาน</label>
        <input type="text" id="reporter" placeholder="ชื่อผู้รายงาน">
      </div>

    </div>

    <br>

    <div class="form-group">
      <label>รายละเอียด</label>
      <textarea id="details"></textarea>
    </div>

    <br>

    <div class="form-group">
      <label>แนวทางแก้ไข</label>
      <textarea id="solution"></textarea>
    </div>

    <br>

    <div class="grid">

      <div class="form-group">
        <label>แนบรูปภาพ 1</label>
        <input type="file" id="file1" accept="image/*">
      </div>

      <div class="form-group">
        <label>แนบรูปภาพ 2</label>
        <input type="file" id="file2" accept="image/*">
      </div>

    </div>

    <div class="btn-group">
      <button class="btn-save" onclick="saveData()">💾 บันทึกข้อมูล</button>
      <button class="btn-clear" onclick="clearForm()">🧹 ล้างฟอร์ม</button>
    </div>

  </div>

  <div class="card">

    <h2 style="margin-bottom:15px;color:#00796b;">รายการความเสี่ยง</h2>

    <div class="table-container">

      <table>

        <thead>
          <tr>
            <th>วันที่</th>
            <th>หัวข้อ</th>
            <th>ระดับ</th>
            <th>รายละเอียด</th>
            <th>แนวทางแก้ไข</th>
            <th>ผู้รายงาน</th>
            <th>รูป 1</th>
            <th>รูป 2</th>
            <th>จัดการ</th>
          </tr>
        </thead>

        <tbody id="tableBody"></tbody>

      </table>

    </div>

  </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwuZXpealGoAtm5c129us9TyqD4Kww5KOJ_BYUvzy1aXGQw_eqRNVekL15A8W9mz8tL/exec";

window.onload = () => {
  loadData();
};

function showLoading(status){
  document.getElementById("loading").style.display = status ? "flex" : "none";
}

async function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

async function saveData(){

  showLoading(true);

  try{

    const id = document.getElementById("recordId").value;

    const file1Input = document.getElementById("file1");
    const file2Input = document.getElementById("file2");

    let file1 = "";
    let file2 = "";
    let file1Name = "";
    let file2Name = "";

    if(file1Input.files[0]){
      file1 = await toBase64(file1Input.files[0]);
      file1Name = file1Input.files[0].name;
    }

    if(file2Input.files[0]){
      file2 = await toBase64(file2Input.files[0]);
      file2Name = file2Input.files[0].name;
    }

    const payload = {
      action: id ? "updateData" : "addData",
      id:id,
      date:document.getElementById("date").value,
      subject:document.getElementById("subject").value,
      riskLevel:document.getElementById("riskLevel").value,
      details:document.getElementById("details").value,
      solution:document.getElementById("solution").value,
      reporter:document.getElementById("reporter").value,
      file1:file1,
      file2:file2,
      file1Name:file1Name,
      file2Name:file2Name,
      existingFile1:window.currentFile1 || "",
      existingFile2:window.currentFile2 || ""
    };

    const response = await fetch(API_URL,{
      method:"POST",
      body:JSON.stringify(payload)
    });

    const result = await response.json();

    if(result.success){
      alert("บันทึกข้อมูลสำเร็จ");
      clearForm();
      loadData();
    }else{
      alert(result.error || "เกิดข้อผิดพลาด");
    }

  }catch(err){
    alert(err);
  }

  showLoading(false);
}

async function loadData(){

  showLoading(true);

  try{

    const response = await fetch(API_URL + "?action=getData");
    const result = await response.json();

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    result.data.reverse().forEach(item=>{

      let badgeClass = "low";

      if(item.riskLevel === "ปานกลาง"){
        badgeClass = "medium";
      }

      if(item.riskLevel === "สูง"){
        badgeClass = "high";
      }

      tbody.innerHTML += `
        <tr>

          <td>${item.date || ''}</td>

          <td>${item.subject || ''}</td>

          <td>
            <span class="badge ${badgeClass}">
              ${item.riskLevel || ''}
            </span>
          </td>

          <td>${item.details || ''}</td>

          <td>${item.solution || ''}</td>

          <td>${item.reporter || ''}</td>

          <td>
            ${
              item.file1
              ? `<a href="${item.file1}" target="_blank">
                  <img src="${item.file1}" class="img-preview">
                </a>`
              : '-'
            }
          </td>

          <td>
            ${
              item.file2
              ? `<a href="${item.file2}" target="_blank">
                  <img src="${item.file2}" class="img-preview">
                </a>`
              : '-'
            }
          </td>

          <td>

            <button class="action-btn edit-btn"
              onclick='editData(${JSON.stringify(item)})'>
              ✏️ แก้ไข
            </button>

            <button class="action-btn delete-btn"
              onclick="deleteData('${item.id}')">
              🗑️ ลบ
            </button>

          </td>

        </tr>
      `;

    });

  }catch(err){
    alert(err);
  }

  showLoading(false);
}

function editData(item){

  document.getElementById("recordId").value = item.id;
  document.getElementById("date").value = item.date;
  document.getElementById("subject").value = item.subject;
  document.getElementById("riskLevel").value = item.riskLevel;
  document.getElementById("details").value = item.details;
  document.getElementById("solution").value = item.solution;
  document.getElementById("reporter").value = item.reporter;

  window.currentFile1 = item.file1 || "";
  window.currentFile2 = item.file2 || "";

  window.scrollTo({
    top:0,
    behavior:"smooth"
  });

}

async function deleteData(id){

  if(!confirm("ต้องการลบข้อมูลนี้ใช่หรือไม่ ?")) return;

  showLoading(true);

  try{

    const response = await fetch(API_URL,{
      method:"POST",
      body:JSON.stringify({
        action:"deleteData",
        id:id
      })
    });

    const result = await response.json();

    if(result.success){
      alert("ลบข้อมูลสำเร็จ");
      loadData();
    }else{
      alert(result.error);
    }

  }catch(err){
    alert(err);
  }

  showLoading(false);
}

function clearForm(){

  document.getElementById("recordId").value = "";
  document.getElementById("date").value = "";
  document.getElementById("subject").value = "";
  document.getElementById("riskLevel").value = "ต่ำ";
  document.getElementById("details").value = "";
  document.getElementById("solution").value = "";
  document.getElementById("reporter").value = "";
  document.getElementById("file1").value = "";
  document.getElementById("file2").value = "";

  window.currentFile1 = "";
  window.currentFile2 = "";
}

</script>

</body>
</html>
